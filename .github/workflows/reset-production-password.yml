name: Reset production password

on:
  workflow_dispatch:
    inputs:
      email:
        description: User email to update
        required: true
        type: string

jobs:
  reset-password:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Reset password
        env:
          HAMHUB_RESET_EMAIL: ${{ inputs.email }}
          HAMHUB_RESET_PASSWORD: ${{ secrets.HAMHUB_TEMP_RESET_PASSWORD }}
          HAMHUB_RESET_CONNECTION: ${{ secrets.HAMHUB_DB_CONNECTION_STRING }}
        run: |
          set -euo pipefail

          if [ -z "${HAMHUB_RESET_PASSWORD:-}" ]; then
            echo "Missing HAMHUB_TEMP_RESET_PASSWORD secret."
            exit 1
          fi

          workdir="$(mktemp -d)"
          cat > "$workdir/ResetPassword.csproj" <<'XML'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net8.0</TargetFramework>
              <ImplicitUsings>enable</ImplicitUsings>
              <Nullable>enable</Nullable>
            </PropertyGroup>
            <ItemGroup>
              <ProjectReference Include="${{ github.workspace }}/backend/HamHub.Infrastructure/HamHub.Infrastructure.csproj" />
              <ProjectReference Include="${{ github.workspace }}/backend/HamHub.Domain/HamHub.Domain.csproj" />
            </ItemGroup>
          </Project>
          XML

          cat > "$workdir/Program.cs" <<'CS'
          using HamHub.Domain.Entities;
          using HamHub.Infrastructure.Persistence;
          using Microsoft.AspNetCore.Identity;
          using Microsoft.EntityFrameworkCore;

          var email = Environment.GetEnvironmentVariable("HAMHUB_RESET_EMAIL")
              ?? throw new InvalidOperationException("Missing reset email.");
          var password = Environment.GetEnvironmentVariable("HAMHUB_RESET_PASSWORD")
              ?? throw new InvalidOperationException("Missing reset password.");
          var connectionString = Environment.GetEnvironmentVariable("HAMHUB_RESET_CONNECTION")
              ?? throw new InvalidOperationException("Missing database connection string.");

          var options = new DbContextOptionsBuilder<ApplicationDbContext>()
              .UseNpgsql(connectionString)
              .Options;

          await using var db = new ApplicationDbContext(options);
          var normalizedEmail = email.ToUpperInvariant();
          var user = await db.Users.SingleOrDefaultAsync(u => u.NormalizedEmail == normalizedEmail || u.Email == email);

          if (user is null)
          {
              Console.Error.WriteLine($"User not found: {email}");
              return 2;
          }

          user.SecurityStamp = Guid.NewGuid().ToString("D");
          user.ConcurrencyStamp = Guid.NewGuid().ToString("D");
          user.PasswordHash = new PasswordHasher<ApplicationUser>().HashPassword(user, password);

          await db.SaveChangesAsync();
          Console.WriteLine($"Password reset for user id {user.Id}");
          return 0;
          CS

          dotnet run --project "$workdir/ResetPassword.csproj"
