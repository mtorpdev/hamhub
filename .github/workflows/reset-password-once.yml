name: Reset password once

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Reset ASP.NET Identity password on Web1
        uses: appleboy/ssh-action@v1
        env:
          RESET_EMAIL: ${{ secrets.HAMHUB_RESET_EMAIL }}
          RESET_PASSWORD: ${{ secrets.HAMHUB_RESET_PASSWORD }}
        with:
          host: ${{ secrets.WEB1_SSH_HOST }}
          username: ${{ secrets.WEB1_SSH_USER }}
          key: ${{ secrets.WEB1_SSH_KEY }}
          envs: RESET_EMAIL,RESET_PASSWORD
          script: |
            set -euo pipefail
            if [ -z "$RESET_EMAIL" ] || [ -z "$RESET_PASSWORD" ]; then
              echo "Missing reset secrets"
              exit 1
            fi

            DB_CONNECTION="$(docker exec hamhub-api printenv ConnectionStrings__DefaultConnection)"
            if [ -z "$DB_CONNECTION" ]; then
              echo "Could not read API container database connection"
              exit 1
            fi

            docker run --rm \
              -e DB_CONNECTION="$DB_CONNECTION" \
              -e RESET_EMAIL="$RESET_EMAIL" \
              -e RESET_PASSWORD="$RESET_PASSWORD" \
              mcr.microsoft.com/dotnet/sdk:8.0 \
              bash -lc '
                set -euo pipefail
                workdir="$(mktemp -d)"
                cd "$workdir"
                dotnet new console --framework net8.0 >/dev/null
                dotnet add package Microsoft.Extensions.Identity.Core --version 8.0.15 >/dev/null
                dotnet add package Npgsql --version 8.0.6 >/dev/null
                cat > Program.cs <<'"'"'CS'"'"'
                using Microsoft.AspNetCore.Identity;
                using Npgsql;

                var connectionString = Environment.GetEnvironmentVariable("DB_CONNECTION")
                    ?? throw new InvalidOperationException("Missing DB_CONNECTION");
                var email = Environment.GetEnvironmentVariable("RESET_EMAIL")
                    ?? throw new InvalidOperationException("Missing RESET_EMAIL");
                var password = Environment.GetEnvironmentVariable("RESET_PASSWORD")
                    ?? throw new InvalidOperationException("Missing RESET_PASSWORD");

                var hasher = new PasswordHasher<object>();
                var passwordHash = hasher.HashPassword(new object(), password);
                var securityStamp = Guid.NewGuid().ToString();
                var concurrencyStamp = Guid.NewGuid().ToString();

                await using var conn = new NpgsqlConnection(connectionString);
                await conn.OpenAsync();

                await using var cmd = conn.CreateCommand();
                cmd.CommandText = """
                    UPDATE "AspNetUsers"
                    SET "PasswordHash" = @hash,
                        "SecurityStamp" = @securityStamp,
                        "ConcurrencyStamp" = @concurrencyStamp
                    WHERE "NormalizedEmail" = @normalizedEmail OR "Email" = @email
                    """;
                cmd.Parameters.AddWithValue("hash", passwordHash);
                cmd.Parameters.AddWithValue("securityStamp", securityStamp);
                cmd.Parameters.AddWithValue("concurrencyStamp", concurrencyStamp);
                cmd.Parameters.AddWithValue("normalizedEmail", email.ToUpperInvariant());
                cmd.Parameters.AddWithValue("email", email);

                var rows = await cmd.ExecuteNonQueryAsync();
                Console.WriteLine($"Updated users: {rows}");
                if (rows != 1)
                    throw new InvalidOperationException($"Expected exactly one user row, updated {rows}.");
                CS

                dotnet run --no-restore
              '
