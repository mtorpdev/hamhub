name: Migrate production database

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply community chat migration
        env:
          NPGSQL_CONNECTION_STRING: ${{ secrets.HAMHUB_DB_CONNECTION_STRING }}
        run: |
          set -euo pipefail
          eval "$(
            python3 <<'PY'
          import os
          import shlex

          raw = os.environ["NPGSQL_CONNECTION_STRING"]
          parts = {}
          for segment in raw.split(";"):
              if not segment.strip() or "=" not in segment:
                  continue
              key, value = segment.split("=", 1)
              parts[key.strip().lower().replace(" ", "")] = value.strip()

          mapping = {
              "host": "PGHOST",
              "port": "PGPORT",
              "database": "PGDATABASE",
              "username": "PGUSER",
              "user": "PGUSER",
              "password": "PGPASSWORD",
          }

          ssl_mode = parts.get("sslmode") or parts.get("ssl mode")
          if ssl_mode:
              parts["sslmode"] = ssl_mode.replace(" ", "").lower()
              mapping["sslmode"] = "PGSSLMODE"

          for key, env_name in mapping.items():
              value = parts.get(key)
              if value:
                  print(f"export {env_name}={shlex.quote(value)}")
          PY
          )"

          psql -v ON_ERROR_STOP=1 <<'SQL'
          CREATE TABLE IF NOT EXISTS "ChatMessages" (
              "Id" integer GENERATED BY DEFAULT AS IDENTITY,
              "UserId" text NOT NULL,
              "CommunityRoomId" integer,
              "Content" character varying(1000) NOT NULL,
              "CreatedAt" timestamp with time zone NOT NULL DEFAULT NOW(),
              CONSTRAINT "PK_ChatMessages" PRIMARY KEY ("Id")
          );

          CREATE INDEX IF NOT EXISTS "IX_ChatMessages_CommunityRoomId_CreatedAt"
              ON "ChatMessages" ("CommunityRoomId", "CreatedAt");
          CREATE INDEX IF NOT EXISTS "IX_ChatMessages_UserId"
              ON "ChatMessages" ("UserId");

          DO $$
          BEGIN
              IF NOT EXISTS (
                  SELECT 1
                  FROM pg_constraint
                  WHERE conname = 'FK_ChatMessages_AspNetUsers_UserId'
              ) THEN
                  ALTER TABLE "ChatMessages"
                  ADD CONSTRAINT "FK_ChatMessages_AspNetUsers_UserId"
                  FOREIGN KEY ("UserId") REFERENCES "AspNetUsers" ("Id")
                  ON DELETE CASCADE;
              END IF;

              IF NOT EXISTS (
                  SELECT 1
                  FROM pg_constraint
                  WHERE conname = 'FK_ChatMessages_CommunityRooms_CommunityRoomId'
              ) THEN
                  ALTER TABLE "ChatMessages"
                  ADD CONSTRAINT "FK_ChatMessages_CommunityRooms_CommunityRoomId"
                  FOREIGN KEY ("CommunityRoomId") REFERENCES "CommunityRooms" ("Id")
                  ON DELETE SET NULL;
              END IF;
          END $$;

          ALTER TABLE "WsjtxDecodes"
              ADD COLUMN IF NOT EXISTS "LowConfidence" boolean NOT NULL DEFAULT false,
              ADD COLUMN IF NOT EXISTS "SpotterGrid" character varying(10),
              ADD COLUMN IF NOT EXISTS "WsjtxId" character varying(80) NOT NULL DEFAULT '',
              ADD COLUMN IF NOT EXISTS "WsjtxTimeMs" bigint NOT NULL DEFAULT 0;

          ALTER TABLE "WsjtxDecodes"
              ALTER COLUMN "Message" TYPE character varying(40);

          INSERT INTO "__EFMigrationsHistory" ("MigrationId", "ProductVersion")
          VALUES
              ('20260613154709_IncreaseWsjtxMessageLength', '8.0.15'),
              ('20260615160905_AddWsjtxDecodeCommandMetadata', '8.0.15')
          ON CONFLICT ("MigrationId") DO NOTHING;
          SQL
